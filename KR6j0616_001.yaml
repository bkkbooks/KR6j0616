body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯爾時世尊告阿難言我觀世間無量衆生多造罪業墮於惡趣經無量時方得出離縱生為人身肢不具設得完具薄福少慧常為惡魔及惡鬼神於晝夜中伺得其便種種惱害不得安隱我愍斯等與説鉢蘭那賒嚩哩大陀羅尼辟除惡魔及惡鬼神若有衆生得聞此陀羅尼發至誠心受持讀誦供養恭敬令彼惡魔及惡鬼神悉皆遠離災害消除無諸疾疫所住之處安隱快樂爾時世尊即説陀羅尼曰那謨引囉怛那二合怛囉二合夜引野一那莫阿引哩也二合阿彌多引婆引野二怛他引誐多引野三阿囉曷二合帝引三藐訖三二合沒馱引野四那謨引阿引哩也二合引嚩路吉帝引説囉引野五冒提薩埵引野六摩賀引薩埵引野七摩賀引哥引嚕尼哥引野八那謨引摩賀引娑他二合引摩鉢囉二合引鉢多二合引鉢多二合引野九冒提薩埵引野十摩賀引薩埵野十一嚩引摩泥去聲呼埵引那莫瀉引彌十二怛網二合引那摩瀉引彌嚩引摩泥去聲十三必舍引唧鉢蘭那二合舍嚩哩十四鉢蘭那二合舍嚩哩婆誐嚩底十五播引舍鉢囉輸馱引哩尼十六夜引儞哥引儞左十七訥婆二合夜引儞踰二合咄鉢二合殿帝引十八夜哥引唧禰引怛踰引十九夜引哥引唧咄摩二合引踰引二十曳引計引唧訥鉢捺囉二合嚩二十一曳引計引唧訥播引夜引娑引二十二曳引計引唧捺毗𠆙切身引婆夜引二十三曳引計引唧訥波娑哩誐二合引二十四烏波娑哩誐二合三嚩無鉢切馱引嚩引二十五烏咄鉢二合殿帝引二十六薩哩嚩二合引尼多引儞二十七薩哩嚩二合引娑多二合引二十八薩哩微二合引帝引嚩引羅多二十九伊舞引咄鉢二合殿三十帝引那半尼多三十一怛捺泥去聲呼那薩帝引那三十二薩爹嚩引計引那三十三伊毗半尼多引提瑟吒二合引乃三十四摩賀引滿怛囉二合鉢奈引三十五惹仁佐切下同惹惹惹三十六摩摩薩波哩嚩引囉寫三十七犖羼酤嚕三十八玉鉢鼎二合波哩播引羅曩三十九扇引鼎莎悉爹二合引野曩酤嚕四十怛𭔞他引四十一唵引阿蜜哩二合帝引四十二末説娑當二合引倪引四十三摩引末囉摩引末囉四十四設末鉢囉二合設末四十五烏波設末四十六咄努尾咄努四十七咄隸引咄母隸引娑嚩二合引賀引四十八唵引鉢蘭那二合舍嚩哩娑嚩二合引賀引四十九那莫設嚩囉引赧引五十摩賀引舍嚩囉引赧引五十一必舍引唧鉢蘭那二合舍嚩哩五十二必舍引唧五十三遏設泥去聲呼末設泥娑嚩二合引賀引五十四唵引必舍引唧娑嚩二合引賀引五十五盎酤哩引莽酤哩引五十六鉢蘭那二合舍嚩哩娑嚩二合引賀引五十七那莫舍嚩囉引赧引五十八必舍引唧鉢蘭那二合舍嚩哩五十九必舍引唧娑嚩二合引賀引六十爾時阿難得聞世尊説此陀羅尼已白言世尊願勿有慮我當憶持宣流於世使諸衆生獲大善利作是語已即用頭頂禮世尊足歡喜而退
